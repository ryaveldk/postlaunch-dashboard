<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PostLaunch">
<meta name="theme-color" content="#0F0D10">
<title>PostLaunch · FCP Dashboard</title>
<style>
  :root {
    --warm: #F5B812;
    --cool: #6C8EBF;
    --alert: #ED8281;
    --calm: #4ADE80;
    --dream: #8B5CF6;
    --bg-base: #0F0D10;
    --text-1: rgba(255, 255, 255, 0.95);
    --text-2: rgba(255, 255, 255, 0.62);
    --text-3: rgba(255, 255, 255, 0.38);
    --border-lo: rgba(255, 255, 255, 0.06);
    --border-mid: rgba(255, 255, 255, 0.10);
    --surface-lo: rgba(255, 255, 255, 0.025);
    --surface-mid: rgba(255, 255, 255, 0.05);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-base);
    color: var(--text-1);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    font-size: 14px; line-height: 1.35;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(245, 184, 18, 0.12), transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(139, 92, 246, 0.10), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(108, 142, 191, 0.10), transparent 55%),
      var(--bg-base);
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }
  .mono {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.04em;
  }
  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 16px 28px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    gap: 12px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
  }
  .brand-chip {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--warm), rgba(245, 184, 18, 0.45));
    display: grid; place-items: center;
    font-weight: 800; color: rgba(0, 0, 0, 0.8);
    box-shadow: 0 0 16px rgba(245, 184, 18, 0.4);
  }
  .brand-text {
    display: flex; flex-direction: column; line-height: 1.1;
  }
  .brand-text .name { font-weight: 700; font-size: 13px; }
  .brand-text .sub {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8px; letter-spacing: 0.18em;
    color: var(--text-3); text-transform: uppercase;
  }
  .clock {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 700; font-size: 13px;
    color: var(--text-2);
    font-variant-numeric: tabular-nums;
  }

  /* Tab bar */
  .tabs {
    display: flex; gap: 6px; overflow-x: auto;
    margin-bottom: 12px;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: 999px;
    background: var(--surface-lo);
    border: 0.75px solid var(--border-lo);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-3);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
  }
  .tab[data-active="true"] {
    color: var(--tab-accent, var(--warm));
    background: color-mix(in srgb, var(--tab-accent, var(--warm)) 12%, transparent);
    border-color: color-mix(in srgb, var(--tab-accent, var(--warm)) 45%, transparent);
  }
  .tab-icon { font-size: 11px; }

  /* Slide container */
  .slide {
    display: none;
    animation: fadeIn 0.5s ease;
  }
  .slide[data-active="true"] { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }

  /* Glass panel */
  .panel {
    background: var(--surface-lo);
    border: 0.75px solid var(--border-mid);
    border-radius: 18px;
    padding: 18px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }
  .panel::before {
    content: "";
    position: absolute; left: 0; right: 0; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.14), transparent);
  }
  .panel-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 12px; margin-bottom: 14px;
  }
  .panel-title {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.16em;
    color: var(--text-2); text-transform: uppercase;
  }
  .panel-sub {
    font-size: 18px; font-weight: 600;
    color: var(--text-1);
    margin-top: 2px;
  }
  .stats {
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .stat {
    display: flex; flex-direction: column;
    align-items: flex-end;
  }
  .stat .label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8px; font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-3);
    text-transform: uppercase;
  }
  .stat .value {
    font-size: 18px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--value-color, var(--text-1));
  }

  /* === Slide 1: Server-rack === */
  .rack-grid {
    display: grid;
    grid-template-columns: repeat(9, minmax(0, 1fr));
    gap: 10px;
    height: 280px;
    align-items: end;
  }
  .server-bar {
    display: flex; flex-direction: column;
    justify-content: flex-end;
    background: linear-gradient(180deg, var(--surface-mid), var(--surface-lo));
    border: 0.75px solid var(--border-lo);
    border-radius: 6px;
    padding: 4px;
    position: relative;
    overflow: hidden;
    height: 100%;
    min-width: 0;
  }
  .server-fill {
    width: 100%;
    display: flex; flex-direction: column;
    border-radius: 4px;
    overflow: hidden;
  }
  .fill-segment {
    width: 100%;
  }
  .fill-nftv  { background: linear-gradient(180deg, var(--cool), color-mix(in srgb, var(--cool) 55%, transparent)); }
  .fill-metro { background: linear-gradient(180deg, var(--warm), color-mix(in srgb, var(--warm) 55%, transparent)); }
  .server-label {
    position: absolute; bottom: 3px; left: 0; right: 0;
    text-align: center;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8px; font-weight: 700;
    color: var(--text-1);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
  }
  .server-pct {
    position: absolute; top: 50%; left: 0; right: 0;
    transform: translateY(-50%);
    text-align: center;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px; font-weight: 700;
    color: rgba(0, 0, 0, 0.7);
  }

  /* === Slide 2: Top produktioner === */
  .prod-list { display: flex; flex-direction: column; gap: 4px; }
  .prod-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 8px; align-items: center;
    padding: 4px 6px;
    border-radius: 5px;
  }
  .client-chip {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8px; font-weight: 700; letter-spacing: 0.08em;
    padding: 2px 5px;
    border-radius: 3px;
    background: color-mix(in srgb, var(--chip-color) 12%, transparent);
    border: 0.5px solid color-mix(in srgb, var(--chip-color) 35%, transparent);
    color: var(--chip-color);
  }
  .chip-metro { --chip-color: var(--warm); }
  .chip-nftv  { --chip-color: var(--cool); }
  .prod-title {
    font-size: 12px; font-weight: 500;
    color: var(--text-1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-width: 0;
  }
  .prod-bar-wrap {
    display: flex; align-items: center; gap: 8px;
    min-width: 120px; flex: 1 1 auto;
  }
  .prod-bar-bg {
    flex: 1;
    height: 6px; background: var(--surface-mid); border-radius: 3px;
    overflow: hidden;
  }
  .prod-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--chip-color), color-mix(in srgb, var(--chip-color) 55%, transparent));
  }
  .prod-tb {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px; font-weight: 700;
    color: var(--chip-color);
    min-width: 54px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* === Slide 3: Klient-split donut === */
  .donut-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 32px;
    padding: 20px 0;
    flex-wrap: wrap;
  }
  .donut {
    position: relative;
    width: 220px; height: 220px;
    flex: 0 0 auto;
  }
  .donut svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .donut .track { fill: none; stroke: var(--border-lo); stroke-width: 18; }
  .donut .seg { fill: none; stroke-width: 18; transition: stroke-dasharray 1s ease; }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
  }
  .donut-center .big {
    font-size: 28px; font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--text-1);
  }
  .donut-center .sub {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
    color: var(--text-3); text-transform: uppercase; margin-top: 4px;
  }
  .client-rows { display: flex; flex-direction: column; gap: 12px; min-width: 260px; flex: 1; }
  .client-card {
    padding: 12px;
    border-radius: 12px;
    background: color-mix(in srgb, var(--chip-color) 5%, transparent);
    border: 0.75px solid color-mix(in srgb, var(--chip-color) 22%, transparent);
  }
  .client-card-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .client-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--chip-color);
    box-shadow: 0 0 6px color-mix(in srgb, var(--chip-color) 60%, transparent);
  }
  .client-name {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--chip-color);
  }
  .client-share {
    margin-left: auto;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; font-weight: 700;
    color: var(--chip-color);
  }
  .split-stats { display: flex; gap: 16px; flex-wrap: wrap; }
  .split-stat .label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
    color: var(--text-3); text-transform: uppercase;
  }
  .split-stat .value {
    font-size: 15px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--chip-color);
    margin-top: 2px;
  }

  /* === Slide 4: Post-assistenter === */
  .assistant-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 12px;
  }
  .assistant-card {
    padding: 14px;
    border-radius: 12px;
    background: var(--surface-lo);
    border: 0.75px solid var(--border-lo);
  }
  .assistant-head {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-weight: 800; color: rgba(0, 0, 0, 0.85);
    font-size: 13px;
    box-shadow: 0 0 10px var(--ast-tint);
    background: linear-gradient(135deg, var(--ast-tint), color-mix(in srgb, var(--ast-tint) 55%, transparent));
  }
  .ast-name { font-weight: 600; font-size: 14px; color: var(--text-1); }
  .ast-role {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px; letter-spacing: 0.1em; color: var(--text-3);
    text-transform: uppercase; margin-top: 2px;
  }
  .ast-count {
    margin-left: auto; text-align: right;
  }
  .ast-count .n {
    font-size: 20px; font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--ast-tint);
  }
  .ast-count .lab {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 8px; letter-spacing: 0.14em;
    color: var(--text-3); text-transform: uppercase;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 7px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px;
    background: color-mix(in srgb, var(--chip-color) 8%, transparent);
    border: 0.5px solid color-mix(in srgb, var(--chip-color) 22%, transparent);
    color: var(--text-2);
  }
  .chip .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--chip-color); }
  .chip .tb { font-weight: 700; color: var(--chip-color); }

  /* === Slide 5: KPI === */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
  }
  .kpi {
    padding: 14px;
    border-radius: 12px;
    background: var(--surface-lo);
    border: 0.75px solid var(--border-lo);
  }
  .kpi .label {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
    color: var(--text-3); text-transform: uppercase;
  }
  .kpi .value {
    font-size: 28px; font-weight: 800;
    font-variant-numeric: tabular-nums;
    margin-top: 4px;
    color: var(--kpi-color, var(--text-1));
  }
  .kpi .sub {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px; color: var(--text-2);
    margin-top: 2px;
  }

  /* Footer dots */
  .dots {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 18px;
  }
  .dot-bar {
    height: 3px; border-radius: 2px;
    background: var(--border-mid);
    transition: all 0.3s ease;
    width: 10px;
  }
  .dot-bar[data-active="true"] {
    background: var(--tab-accent, var(--warm));
    width: 28px;
  }

  /* iPhone tweaks */
  @media (max-width: 640px) {
    .app { padding: 14px 12px 22px; }
    .panel { padding: 14px; border-radius: 14px; }
    .stats { gap: 10px; }
    .stat .value { font-size: 15px; }
    .rack-grid { height: 220px; gap: 6px; }
    .server-label { font-size: 7px; }
    .prod-title { font-size: 11px; max-width: 140px; }
    .prod-bar-wrap { min-width: 70px; }
    .prod-tb { font-size: 9px; min-width: 48px; }
    .donut-wrap { gap: 18px; }
    .donut { width: 180px; height: 180px; }
    .donut-center .big { font-size: 22px; }
    .assistant-grid { grid-template-columns: 1fr; }
    .kpi .value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="brand-chip">P</div>
      <div class="brand-text">
        <span class="name">PostLaunch</span>
        <span class="sub">FCP Dashboard</span>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <span class="mono" style="font-size:9px; font-weight:700; letter-spacing:0.18em; color:var(--calm); padding:3px 8px; border-radius:999px; background:rgba(74,222,128,0.1); border:0.5px solid rgba(74,222,128,0.35); text-transform:uppercase;">SYNKET 18/04 · 01:06</span>
      <div class="clock" id="clock">--:--</div>

  </header>

  <div class="tabs" id="tabs"></div>

  <div id="slides"></div>

  <div class="dots" id="dots"></div>

</div>

  ];

  // ---------- Derived ----------
  const totalUsed = PRODUCTIONS.reduce((a, p) => a + p.tb, 0);
  const totalCap  = SERVERS.reduce((a, s) => a + s.cap, 0);
  const metroTB   = PRODUCTIONS.filter(p => p.client === "metro").reduce((a, p) => a + p.tb, 0);
  const nftvTB    = PRODUCTIONS.filter(p => p.client === "nftv").reduce((a, p) => a + p.tb, 0);
  const loadPct   = totalUsed / totalCap;

  function usedOn(sid)   { return PRODUCTIONS.filter(p => p.server === sid).reduce((a, p) => a + p.tb, 0); }
  function metroOn(sid)  { return PRODUCTIONS.filter(p => p.server === sid && p.client === "metro").reduce((a, p) => a + p.tb, 0); }
  function nftvOn(sid)   { return PRODUCTIONS.filter(p => p.server === sid && p.client === "nftv").reduce((a, p) => a + p.tb, 0); }
  function prodsFor(aid) { return PRODUCTIONS.filter(p => p.ast.includes(aid)).sort((a, b) => b.tb - a.tb); }

  function tbLabel(n) {
    if (n >= 1000) return (n / 1000).toFixed(2) + " PB";
    return Math.round(n) + " TB";
  }
  function tbPrecise(n) { return n.toFixed(1) + " TB"; }
  function clientMeta(c) {
    return c === "metro"
      ? { name: "Metronome", short: "MET", color: "var(--warm)", chipClass: "chip-metro" }
      : { name: "NFTV",      short: "NFT", color: "var(--cool)", chipClass: "chip-nftv" };
  }
  function statusColor(s) {
    switch (s) {
      case "Aktiv":        return "var(--calm)";
      case "Levering":     return "var(--alert)";
      case "Forberedelse": return "var(--dream)";
      default:             return "var(--text-3)";
    }
  }

  // ---------- Slides ----------
  const SLIDES = [
    {
      id: "servers",
      title: "Server-rack",
      icon: "🗄",
      accent: "var(--cool)",
      render: renderServers,
    },
    {
      id: "top",
      title: "Top produktioner",
      icon: "📊",
      accent: "var(--warm)",
      render: renderTop,
    },
    {
      id: "clients",
      title: "Klientfordeling",
      icon: "🥧",
      accent: "var(--dream)",
      render: renderClients,
    },
    {
      id: "assistants",
      title: "Post-assistenter",
      icon: "👥",
      accent: "var(--alert)",
      render: renderAssistants,
    },
    {
      id: "kpi",
      title: "Nøgletal",
      icon: "📈",
      accent: "var(--calm)",
      render: renderKPI,
    },
  ];

  function renderServers() {
    const rows = SERVERS.map(s => {
      const used = usedOn(s.id);
      const m = metroOn(s.id);
      const n = nftvOn(s.id);
      const pct = Math.min(100, (used / s.cap) * 100);
      const mPct = used === 0 ? 0 : (m / used) * pct;
      const nPct = used === 0 ? 0 : (n / used) * pct;
      return `
        <div class="server-bar" title="${s.id} · ${s.name} · ${tbPrecise(used)} / ${tbPrecise(s.cap)}">
          <div class="server-fill">
            <div class="fill-segment fill-nftv"  style="height: ${nPct}%"></div>
            <div class="fill-segment fill-metro" style="height: ${mPct}%"></div>
          </div>
          <div class="server-pct">${Math.round(pct)}%</div>
          <div class="server-label">${s.id}</div>
        </div>
      `;
    }).join("");

    return `
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">FCP-SERVERE</div>
            <div class="panel-sub">Kapacitet på tværs af rack</div>
          </div>
          <div class="stats">
            <div class="stat"><div class="label">Brugt</div><div class="value" style="color:var(--alert)">${tbLabel(totalUsed)}</div></div>
            <div class="stat"><div class="label">Fri</div><div class="value" style="color:var(--calm)">${tbLabel(totalCap - totalUsed)}</div></div>
            <div class="stat"><div class="label">Samlet</div><div class="value">${tbLabel(totalCap)}</div></div>
            <div class="stat"><div class="label">Belastning</div><div class="value" style="color:var(--warm)">${Math.round(loadPct * 100)}%</div></div>
          </div>
        </div>
        <div class="rack-grid">${rows}</div>
      </div>
    `;
  }

  function renderTop() {
    const sorted = [...PRODUCTIONS].sort((a, b) => b.tb - a.tb);
    const max = sorted[0].tb;
    const avg = Math.round(sorted.reduce((a, p) => a + p.tb, 0) / sorted.length);
    const rows = sorted.map(p => {
      const m = clientMeta(p.client);
      const frac = (p.tb / max) * 100;
      return `
        <div class="prod-row" style="--chip-color:${m.color}">
          <span class="client-chip ${m.chipClass}">${m.short}</span>
          <span class="prod-title">${p.title}</span>
          <div class="prod-bar-wrap">
            <div class="prod-bar-bg"><div class="prod-bar-fill" style="width:${frac}%"></div></div>
            <span class="prod-tb">${tbPrecise(p.tb)}</span>
          </div>
          <span class="mono" style="font-size:8px; color:${statusColor(p.status)}; letter-spacing:0.08em;">${p.status.toUpperCase()}</span>
        </div>
      `;
    }).join("");

    return `
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">PRODUKTIONER · RANGERING</div>
            <div class="panel-sub">Største forbrug lige nu</div>
          </div>
          <div class="stats">
            <div class="stat"><div class="label">Totalt</div><div class="value">${PRODUCTIONS.length}</div></div>
            <div class="stat"><div class="label">Største</div><div class="value" style="color:var(--warm)">${tbPrecise(max)}</div></div>
            <div class="stat"><div class="label">Gns.</div><div class="value" style="color:var(--cool)">${avg} TB</div></div>
          </div>
        </div>
        <div class="prod-list">${rows}</div>
      </div>
    `;
  }

  function renderClients() {
    const metroShare = metroTB / (metroTB + nftvTB);
    const C = 2 * Math.PI * 90;
    const metroDash = C * metroShare;
    const nftvDash  = C * (1 - metroShare);

    function clientCard(c, tb) {
      const m = clientMeta(c);
      const prods = PRODUCTIONS.filter(p => p.client === c);
      const share = tb / (metroTB + nftvTB);
      const avg = Math.round(tb / prods.length);
      const maxT = Math.max(...prods.map(p => p.tb));
      const minT = Math.min(...prods.map(p => p.tb));
      return `
        <div class="client-card" style="--chip-color:${m.color}">
          <div class="client-card-head">
            <span class="client-dot"></span>
            <span class="client-name">${m.name.toUpperCase()}</span>
            <span class="client-share">${Math.round(share * 100)}%</span>
          </div>
          <div class="split-stats">
            <div class="split-stat"><div class="label">TB</div><div class="value">${tbLabel(tb)}</div></div>
            <div class="split-stat"><div class="label">Prod.</div><div class="value">${prods.length}</div></div>
            <div class="split-stat"><div class="label">Gns.</div><div class="value">${avg} TB</div></div>
            <div class="split-stat"><div class="label">Største</div><div class="value">${tbPrecise(maxT)}</div></div>
            <div class="split-stat"><div class="label">Mindste</div><div class="value">${tbPrecise(minT)}</div></div>
          </div>
        </div>
      `;
    }

    return `
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">KLIENTFORDELING</div>
            <div class="panel-sub">Hvor ligger TB'erne</div>
          </div>
        </div>
        <div class="donut-wrap">
          <div class="donut">
            <svg viewBox="0 0 220 220">
              <circle class="track" cx="110" cy="110" r="90" />
              <circle class="seg" cx="110" cy="110" r="90" stroke="var(--warm)"
                      stroke-dasharray="${metroDash} ${C}" stroke-dashoffset="0" />
              <circle class="seg" cx="110" cy="110" r="90" stroke="var(--cool)"
                      stroke-dasharray="${nftvDash} ${C}" stroke-dashoffset="${-metroDash}" />
            </svg>
            <div class="donut-center">
              <div class="big">${tbLabel(metroTB + nftvTB)}</div>
              <div class="sub">Samlet</div>
              <div class="mono" style="font-size:10px; color:var(--text-2); margin-top:6px;">${PRODUCTIONS.length} produktioner</div>
            </div>
          </div>
          <div class="client-rows">
            ${clientCard("metro", metroTB)}
            ${clientCard("nftv", nftvTB)}
          </div>
        </div>
      </div>
    `;
  }

  function renderAssistants() {
    const cards = ASSISTANTS.map(a => {
      const prods = prodsFor(a.id);
      const total = prods.reduce((s, p) => s + p.tb, 0);
      const metro = prods.filter(p => p.client === "metro").length;
      const nftv  = prods.filter(p => p.client === "nftv").length;
      const chips = prods.map(p => {
        const m = clientMeta(p.client);
        return `<span class="chip" style="--chip-color:${m.color}"><span class="dot"></span>${p.title}<span class="tb">${tbPrecise(p.tb)}</span></span>`;
      }).join("");
      return `
        <div class="assistant-card" style="--ast-tint:${a.tint}">
          <div class="assistant-head">
            <div class="avatar">${a.initials}</div>
            <div>
              <div class="ast-name">${a.full}</div>
              <div class="ast-role">${a.role}</div>
            </div>
            <div class="ast-count"><div class="n">${prods.length}</div><div class="lab">Prod.</div></div>
          </div>
          <div style="display:flex; gap:8px; margin-bottom:10px; font-size:10px;" class="mono">
            <span style="color:var(--warm)">MET · ${metro}</span>
            <span style="color:var(--cool)">NFT · ${nftv}</span>
            <span style="margin-left:auto; color:var(--text-2)">${tbLabel(total)}</span>
          </div>
          <div class="chips">${chips}</div>
        </div>
      `;
    }).join("");

    return `
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">POST-ASSISTENTER</div>
            <div class="panel-sub">Hvem holder hvad</div>
          </div>
          <div class="stats">
            <div class="stat"><div class="label">Team</div><div class="value">${ASSISTANTS.length}</div></div>
            <div class="stat"><div class="label">Tildelinger</div><div class="value" style="color:var(--dream)">${PRODUCTIONS.reduce((s, p) => s + p.ast.length, 0)}</div></div>
          </div>
        </div>
        <div class="assistant-grid">${cards}</div>
      </div>
    `;
  }

  function renderKPI() {
    const active = PRODUCTIONS.filter(p => p.status === "Aktiv").length;
    const delivery = PRODUCTIONS.filter(p => p.status === "Levering").length;
    const prep = PRODUCTIONS.filter(p => p.status === "Forberedelse").length;
    const topShare = metroTB >= nftvTB
      ? `MET ${Math.round(metroTB / (metroTB + nftvTB) * 100)}%`
      : `NFT ${Math.round(nftvTB / (metroTB + nftvTB) * 100)}%`;

    const items = [
      { l: "Samlet lager",  v: tbLabel(totalUsed), s: "af " + tbLabel(totalCap), c: "var(--warm)" },
      { l: "Belastning",    v: Math.round(loadPct * 100) + "%", s: "fri " + tbLabel(totalCap - totalUsed), c: "var(--alert)" },
      { l: "Produktioner",  v: PRODUCTIONS.length, s: "aktive " + active, c: "var(--cool)" },
      { l: "Leveringer",    v: delivery, s: prep + " forberedes", c: "var(--dream)" },
      { l: "Team",          v: ASSISTANTS.length, s: (PRODUCTIONS.reduce((s,p) => s + p.ast.length, 0) / ASSISTANTS.length).toFixed(1) + " prod./pers", c: "var(--calm)" },
      { l: "Dom. klient",   v: topShare, s: "af " + PRODUCTIONS.length + " prod.", c: "var(--warm)" },
    ].map(k => `
      <div class="kpi" style="--kpi-color:${k.c}">
        <div class="label">${k.l}</div>
        <div class="value">${k.v}</div>
        <div class="sub">${k.s}</div>
      </div>
    `).join("");

    return `
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">NØGLETAL</div>
            <div class="panel-sub">Hele billedet i ét blik</div>
          </div>
        </div>
        <div class="kpi-grid">${items}</div>
      </div>
    `;
  }

  // ---------- App shell ----------
  let current = 0;
  let autoTimer = null;

  function mount() {
    const tabs = document.getElementById("tabs");
    const slides = document.getElementById("slides");
    const dots = document.getElementById("dots");

    tabs.innerHTML = SLIDES.map((s, i) => `
      <button class="tab" data-i="${i}" style="--tab-accent:${s.accent}">
        <span class="tab-icon">${s.icon}</span> ${s.title}
      </button>
    `).join("");

    slides.innerHTML = SLIDES.map((s, i) => `
      <div class="slide" data-i="${i}">${s.render()}</div>
    `).join("");

    dots.innerHTML = SLIDES.map((_, i) => `<div class="dot-bar" data-i="${i}"></div>`).join("");

    tabs.addEventListener("click", (e) => {
      const btn = e.target.closest(".tab");
      if (!btn) return;
      show(parseInt(btn.dataset.i, 10));
      resetTimer();
    });

    // Swipe support
    let touchX = 0;
    slides.addEventListener("touchstart", (e) => { touchX = e.touches[0].clientX; }, { passive: true });
    slides.addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) < 40) return;
      show(current + (dx < 0 ? 1 : -1));
      resetTimer();
    });

    show(0);
    resetTimer();
    tickClock();
    setInterval(tickClock, 1000);
  }

  function show(i) {
    if (i < 0) i = SLIDES.length - 1;
    if (i >= SLIDES.length) i = 0;
    current = i;
    document.querySelectorAll(".tab").forEach(t => t.dataset.active = (parseInt(t.dataset.i, 10) === i).toString());
    document.querySelectorAll(".slide").forEach(s => s.dataset.active = (parseInt(s.dataset.i, 10) === i).toString());
    document.querySelectorAll(".dot-bar").forEach(d => {
      const isActive = parseInt(d.dataset.i, 10) === i;
      d.dataset.active = isActive.toString();
      if (isActive) d.style.setProperty("--tab-accent", SLIDES[i].accent);
    });
  }

  function resetTimer() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => show(current + 1), 15000);
  }

  function tickClock() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, "0");
    const mm = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
  }

  mount();
</script>
</body>
</html>
