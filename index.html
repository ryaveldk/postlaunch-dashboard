<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PostLaunch">
<meta name="theme-color" content="#0F0D10">
<!-- Auto-reload hver 5. min så TV-displays henter friske data efter post-commit syncs -->
<meta http-equiv="refresh" content="300">
<title>PostLaunch · FCP Dashboard</title>
<style>
  :root {
    --warm:  #F5B812;
    --cool:  #6C8EBF;
    --alert: #ED8281;
    --calm:  #4ADE80;
    --dream: #8B5CF6;
    --peach: #DE8640;

    --bg:          #0B0A0D;
    --bg-panel:    rgba(255, 255, 255, 0.028);
    --bg-panel-hi: rgba(255, 255, 255, 0.05);
    --text-1: rgba(255, 255, 255, 0.96);
    --text-2: rgba(255, 255, 255, 0.62);
    --text-3: rgba(255, 255, 255, 0.38);
    --border-lo: rgba(255, 255, 255, 0.06);
    --border-mid: rgba(255, 255, 255, 0.10);

    --font-mono: 'SF Mono', 'JetBrains Mono', Menlo, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text-1);
    font-family: var(--font-sans);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(1200px 700px at 82% 8%, rgba(245, 184, 18, 0.10), transparent 60%),
      radial-gradient(900px 600px at 8% 92%, rgba(108, 142, 191, 0.08), transparent 60%),
      var(--bg);
  }

  /* ── Grid ── */
  #dashboard {
    display: grid;
    grid-template-columns: 1.1fr 1.6fr 1fr;
    grid-template-rows: auto 1fr 1fr 0.75fr;
    gap: 18px;
    padding: 22px;
    height: 100vh;
    max-height: 100vh;
  }

  #header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-logo {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--warm), #b28200);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
    color: rgba(0,0,0,0.8);
    font-size: 16px;
    box-shadow: 0 0 16px rgba(245, 184, 18, 0.45);
  }
  .brand-title {
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.01em;
  }
  .brand-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-3);
    text-transform: uppercase;
  }

  .clock {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-2);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }

  /* ── Panels ── */
  .panel {
    background: var(--bg-panel);
    border: 0.5px solid var(--border-lo);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .panel.accent-warm  { border-top: 1px solid rgba(245, 184, 18, 0.45); }
  .panel.accent-cool  { border-top: 1px solid rgba(108, 142, 191, 0.45); }
  .panel.accent-dream { border-top: 1px solid rgba(139, 92, 246, 0.45); }
  .panel.accent-calm  { border-top: 1px solid rgba(74, 222, 128, 0.45); }
  .panel.accent-alert { border-top: 1px solid rgba(237, 130, 129, 0.45); }

  .panel-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-3);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-meta {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-2);
    font-weight: 600;
  }
  .panel-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-1);
    letter-spacing: -0.01em;
    margin-bottom: 14px;
  }

  /* ── Grid positions ── */
  #gauge-panel { grid-column: 1; grid-row: 2 / span 2; }
  #rack-panel  { grid-column: 2; grid-row: 2 / span 2; }
  #donut-panel { grid-column: 3; grid-row: 2; }
  #asst-panel  { grid-column: 3; grid-row: 3; }
  #prods-panel { grid-column: 1 / span 2; grid-row: 4; }
  #growth-panel{ grid-column: 3; grid-row: 4; }

  /* ── Big radial gauge ── */
  .gauge-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
  }
  .gauge-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    line-height: 1;
  }
  .gauge-value {
    font-size: 68px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-1);
    font-variant-numeric: tabular-nums;
  }
  .gauge-unit {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.16em;
    color: var(--warm);
    text-transform: uppercase;
    font-weight: 700;
  }
  .gauge-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .gauge-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    padding: 0 4px;
  }
  .gauge-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .gauge-stat-num {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-1);
    font-variant-numeric: tabular-nums;
  }
  .gauge-stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--text-3);
    text-transform: uppercase;
    font-weight: 700;
  }

  /* ── Server rack (vertical thermometers) ── */
  .rack {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    gap: 8px;
    flex: 1;
    align-items: stretch;
  }
  .rack-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 0;
  }
  .rack-id {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-3);
    font-weight: 700;
  }
  .rack-pct {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }
  .thermo {
    flex: 1;
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 0.5px solid var(--border-lo);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    min-height: 80px;
  }
  .thermo-fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, var(--fill-color, var(--cool)), rgba(108, 142, 191, 0.35));
    transition: height 0.6s ease;
    border-top: 1px solid rgba(255, 255, 255, 0.25);
  }
  .thermo-mark {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.15);
  }
  .thermo-mark.high  { top: 15%; background: rgba(237, 130, 129, 0.3); }
  .thermo-mark.mid   { top: 50%; }
  .thermo-mark.low   { top: 85%; }

  /* ── Donut ── */
  .donut-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
  }
  .donut-legend {
    display: flex;
    gap: 18px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .donut-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .donut-legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ── Horizontal bar list ── */
  .barlist {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
  }
  .barrow {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 70px;
    gap: 12px;
    align-items: center;
  }
  .barrow-label {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-1);
  }
  .barrow-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-2);
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .barrow-track {
    grid-column: 1 / -1;
    height: 4px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .barrow-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--bar-start, var(--cool)) 0%, var(--bar-end, var(--warm)) 100%);
    border-radius: 2px;
    min-width: 2px;
  }

  /* ── Assistant radial mini-gauges ── */
  .asst-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    flex: 1;
  }
  .asst-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 8px;
    position: relative;
  }
  .asst-ring {
    position: relative;
    width: 56px; height: 56px;
  }
  .asst-init {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text-1);
  }
  .asst-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-1);
  }
  .asst-tb {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    color: var(--text-3);
    font-weight: 700;
  }

  /* ── Growth curve ── */
  #growth-panel { padding: 16px 20px; }
  .growth-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .growth-stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .growth-num {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-1);
    font-variant-numeric: tabular-nums;
  }
  .growth-delta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--calm);
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .growth-delta.down { color: var(--alert); }

  .growth-svg {
    flex: 1;
    min-height: 0;
    width: 100%;
  }

  /* ── SVG defaults ── */
  svg { display: block; }
  .gauge-svg { overflow: visible; }

  /* ── Anim ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .panel { animation: fadeIn 0.5s ease-out backwards; }
  #gauge-panel  { animation-delay: 0.0s; }
  #rack-panel   { animation-delay: 0.05s; }
  #donut-panel  { animation-delay: 0.1s; }
  #asst-panel   { animation-delay: 0.15s; }
  #prods-panel  { animation-delay: 0.2s; }
  #growth-panel { animation-delay: 0.25s; }
</style>
</head>
<body>

<div id="dashboard">
  <div id="header">
    <div class="brand">
      <div class="brand-logo">P</div>
      <div>
        <div class="brand-title">PostLaunch · FCP Dashboard</div>
        <div class="brand-sub">Kommando-central · Live data</div>
      </div>
    </div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="panel accent-warm" id="gauge-panel">
    <div class="panel-label"><span>KAPACITET</span><span class="panel-meta" id="gauge-ratio">—</span></div>
    <div class="gauge-wrap">
      <svg class="gauge-svg" viewBox="0 0 220 220" width="220" height="220">
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stop-color="#F5B812"/>
            <stop offset="60%" stop-color="#DE8640"/>
            <stop offset="100%" stop-color="#ED8281"/>
          </linearGradient>
        </defs>
        <circle cx="110" cy="110" r="92" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="18"/>
        <circle id="gauge-arc" cx="110" cy="110" r="92" fill="none" stroke="url(#gaugeGrad)" stroke-width="18"
                stroke-linecap="round" stroke-dasharray="578" stroke-dashoffset="578"
                transform="rotate(-90 110 110)"/>
        <g id="gauge-ticks"></g>
      </svg>
      <div class="gauge-center" style="margin-top:-170px">
        <div class="gauge-value" id="gauge-pct">0</div>
        <div class="gauge-unit">% Belastning</div>
        <div class="gauge-sub" id="gauge-raw">—</div>
      </div>
      <div style="height:12px"></div>
      <div class="gauge-stats">
        <div class="gauge-stat">
          <div class="gauge-stat-num" id="stat-productions">—</div>
          <div class="gauge-stat-label">Produktioner</div>
        </div>
        <div class="gauge-stat">
          <div class="gauge-stat-num" id="stat-servers">—</div>
          <div class="gauge-stat-label">Servere</div>
        </div>
        <div class="gauge-stat">
          <div class="gauge-stat-num" id="stat-active">—</div>
          <div class="gauge-stat-label">Aktive</div>
        </div>
        <div class="gauge-stat">
          <div class="gauge-stat-num" id="stat-delivery">—</div>
          <div class="gauge-stat-label">Levering</div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel accent-cool" id="rack-panel">
    <div class="panel-label"><span>SERVER-RACK</span><span class="panel-meta" id="rack-hottest">—</span></div>
    <div class="panel-title">Belastning per volume</div>
    <div class="rack" id="rack"></div>
  </div>

  <div class="panel accent-dream" id="donut-panel">
    <div class="panel-label"><span>KLIENT-SPLIT</span></div>
    <div class="donut-wrap">
      <svg viewBox="0 0 200 200" width="160" height="160">
        <defs>
          <linearGradient id="metroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F5B812"/>
            <stop offset="100%" stop-color="#DE8640"/>
          </linearGradient>
          <linearGradient id="nftvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6C8EBF"/>
            <stop offset="100%" stop-color="#8B5CF6"/>
          </linearGradient>
        </defs>
        <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="22"/>
        <circle id="donut-metro" cx="100" cy="100" r="78" fill="none" stroke="url(#metroGrad)" stroke-width="22"
                stroke-linecap="butt" transform="rotate(-90 100 100)"/>
        <circle id="donut-nftv"  cx="100" cy="100" r="78" fill="none" stroke="url(#nftvGrad)"  stroke-width="22"
                stroke-linecap="butt" transform="rotate(-90 100 100)"/>
        <text x="100" y="96" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-size="26" font-weight="700" font-family="var(--font-sans)" id="donut-total">—</text>
        <text x="100" y="118" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-weight="700" letter-spacing="2" font-family="var(--font-mono)">TOTAL</text>
      </svg>
      <div class="donut-legend">
        <div class="donut-legend-item">
          <div class="donut-legend-dot" style="background: linear-gradient(135deg,#F5B812,#DE8640)"></div>
          <div><b id="metro-pct">—</b> Metronome · <span id="metro-tb">—</span></div>
        </div>
        <div class="donut-legend-item">
          <div class="donut-legend-dot" style="background: linear-gradient(135deg,#6C8EBF,#8B5CF6)"></div>
          <div><b id="nftv-pct">—</b> NFTV · <span id="nftv-tb">—</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel accent-calm" id="asst-panel">
    <div class="panel-label"><span>POST-ASSISTENTER</span><span class="panel-meta" id="asst-total">—</span></div>
    <div class="asst-grid" id="asst-grid"></div>
  </div>

  <div class="panel accent-warm" id="prods-panel">
    <div class="panel-label"><span>TOP PRODUKTIONER</span><span class="panel-meta" id="prods-meta">—</span></div>
    <div class="barlist" id="prods-list"></div>
  </div>

  <div class="panel accent-alert" id="growth-panel">
    <div class="panel-label"><span>VÆKST · 30 DAGE</span></div>
    <div class="growth-wrap">
      <div class="growth-stat">
        <div class="growth-num" id="growth-current">—</div>
        <div class="growth-delta" id="growth-delta">—</div>
      </div>
      <svg class="growth-svg" id="growth-svg" viewBox="0 0 400 120" preserveAspectRatio="none"></svg>
    </div>
  </div>
</div>

    { title: "Kystvagten",                 client: "nftv",  tb: 46,  server: "FCP-05", status: "Aktiv",        ast: ["kasper","naja"] },
    { title: "Håndværkerne · S7",          client: "metro", tb: 44,  server: "FCP-05", status: "Aktiv",        ast: ["lars","kasper"] },
    { title: "Vinterlejren",               client: "nftv",  tb: 38,  server: "FCP-09", status: "Forberedelse", ast: ["mette"] },
    { title: "Danse med Stjerner · BTS",   client: "metro", tb: 32,  server: "FCP-06", status: "Arkiv",        ast: ["naja"] },
    { title: "Sidste Færge",               client: "nftv",  tb: 22,  server: "FCP-09", status: "Arkiv",        ast: ["tobias"] },
    { title: "Talent 2026",                client: "metro", tb: 18,  server: "FCP-09", status: "Levering",     ast: ["ida"] },
    { title: "Skyggeland",                 client: "nftv",  tb: 14,  server: "FCP-02", status: "Forberedelse", ast: ["ida"] },
    { title: "Vinmarken",                  client: "metro", tb: 12,  server: "FCP-09", status: "Forberedelse", ast: ["kasper"] },
  ];

  // ---------- Derived ----------
  const totalUsed = PRODUCTIONS.reduce((a,p) => a + p.tb, 0);
  const totalCap  = SERVERS.reduce((a,s) => a + s.cap, 0);
  const metroTB   = PRODUCTIONS.filter(p => p.client === "metro").reduce((a,p) => a + p.tb, 0);
  const nftvTB    = PRODUCTIONS.filter(p => p.client === "nftv").reduce((a,p) => a + p.tb, 0);
  const loadPct   = totalUsed / totalCap;

  function usedOn(sid) { return PRODUCTIONS.filter(p => p.server === sid).reduce((a,p) => a + p.tb, 0); }
  function tbOf(list)  { return list.reduce((a,p) => a + p.tb, 0); }
  function tbLabel(n) {
    if (n >= 1000) return (n / 1000).toFixed(2) + " PB";
    return Math.round(n) + " TB";
  }

  // ---------- Rendering ----------
  function renderClock() {
    const now = new Date();
    const time = now.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });
    document.getElementById('clock').textContent = `${date.toUpperCase()} · ${time}`;
  }

  function renderGauge() {
    const pct = Math.round(loadPct * 100);
    const C = 2 * Math.PI * 92;
    const offset = C - (C * Math.min(1, loadPct));
    const arc = document.getElementById('gauge-arc');
    arc.setAttribute('stroke-dasharray', C);
    setTimeout(() => arc.setAttribute('stroke-dashoffset', offset), 100);

    document.getElementById('gauge-pct').textContent = pct;
    document.getElementById('gauge-raw').textContent = `${tbLabel(totalUsed)} / ${tbLabel(totalCap)}`;
    document.getElementById('gauge-ratio').textContent = `${tbLabel(totalCap - totalUsed)} FRI`;

    // Tick marks around gauge
    const ticks = document.getElementById('gauge-ticks');
    ticks.innerHTML = '';
    for (let i = 0; i <= 10; i++) {
      const angle = -90 + (i / 10) * 360;
      const rad = angle * Math.PI / 180;
      const r1 = 104, r2 = i % 5 === 0 ? 112 : 108;
      const x1 = 110 + Math.cos(rad) * r1;
      const y1 = 110 + Math.sin(rad) * r1;
      const x2 = 110 + Math.cos(rad) * r2;
      const y2 = 110 + Math.sin(rad) * r2;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', 'rgba(255,255,255,0.22)');
      line.setAttribute('stroke-width', '1');
      ticks.appendChild(line);
    }

    document.getElementById('stat-productions').textContent = PRODUCTIONS.length;
    document.getElementById('stat-servers').textContent     = SERVERS.length;
    document.getElementById('stat-active').textContent      = PRODUCTIONS.filter(p => p.status === 'Aktiv').length;
    document.getElementById('stat-delivery').textContent    = PRODUCTIONS.filter(p => p.status === 'Levering').length;
  }

  function renderRack() {
    const container = document.getElementById('rack');
    container.innerHTML = '';

    let hottest = { id: '—', pct: 0 };
    SERVERS.forEach(s => {
      const used = usedOn(s.id);
      const pct = Math.min(100, (used / s.cap) * 100);
      if (pct > hottest.pct) hottest = { id: s.id, pct };

      const fillColor = pct >= 85 ? 'var(--alert)' : pct >= 60 ? 'var(--warm)' : 'var(--cool)';
      const cell = document.createElement('div');
      cell.className = 'rack-cell';
      cell.innerHTML = `
        <div class="rack-id">${s.id.replace('FCP-', '')}</div>
        <div class="thermo">
          <div class="thermo-mark high"></div>
          <div class="thermo-mark mid"></div>
          <div class="thermo-mark low"></div>
          <div class="thermo-fill" style="height:0%; --fill-color:${fillColor}"></div>
        </div>
        <div class="rack-pct" style="color:${fillColor}">${Math.round(pct)}%</div>
      `;
      container.appendChild(cell);
      setTimeout(() => {
        cell.querySelector('.thermo-fill').style.height = pct + '%';
      }, 200);
    });

    document.getElementById('rack-hottest').textContent = `HOT: ${hottest.id} · ${Math.round(hottest.pct)}%`;
  }

  function renderDonut() {
    const metroShare = metroTB / (metroTB + nftvTB);
    const C = 2 * Math.PI * 78;
    const metroLen = C * metroShare;
    const nftvLen  = C * (1 - metroShare);

    const metroEl = document.getElementById('donut-metro');
    metroEl.setAttribute('stroke-dasharray', `0 ${C}`);
    setTimeout(() => metroEl.setAttribute('stroke-dasharray', `${metroLen} ${C - metroLen}`), 150);

    const nftvEl = document.getElementById('donut-nftv');
    nftvEl.setAttribute('stroke-dasharray', `0 ${C}`);
    nftvEl.setAttribute('stroke-dashoffset', -metroLen);
    setTimeout(() => nftvEl.setAttribute('stroke-dasharray', `${nftvLen} ${C - nftvLen}`), 250);

    document.getElementById('donut-total').textContent = tbLabel(totalUsed);
    document.getElementById('metro-pct').textContent = Math.round(metroShare * 100) + '%';
    document.getElementById('nftv-pct').textContent  = Math.round((1 - metroShare) * 100) + '%';
    document.getElementById('metro-tb').textContent  = tbLabel(metroTB);
    document.getElementById('nftv-tb').textContent   = tbLabel(nftvTB);
  }

  function renderAssistants() {
    const grid = document.getElementById('asst-grid');
    grid.innerHTML = '';
    const stats = ASSISTANTS.map(a => ({
      ...a,
      tb: tbOf(PRODUCTIONS.filter(p => p.ast.includes(a.id))),
      count: PRODUCTIONS.filter(p => p.ast.includes(a.id)).length
    }));
    const maxTB = Math.max(...stats.map(s => s.tb));
    stats.forEach(s => {
      const pct = (s.tb / maxTB) * 100;
      const C = 2 * Math.PI * 24;
      const offset = C - (C * (pct / 100));
      const cell = document.createElement('div');
      cell.className = 'asst-cell';
      cell.innerHTML = `
        <div class="asst-ring">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4"/>
            <circle cx="28" cy="28" r="24" fill="none" stroke="${s.tint}" stroke-width="4"
                    stroke-linecap="round" transform="rotate(-90 28 28)"
                    stroke-dasharray="${C}" stroke-dashoffset="${C}"
                    class="asst-arc" style="transition: stroke-dashoffset 0.7s ease"/>
          </svg>
          <div class="asst-init" style="color:${s.tint}">${s.initials}</div>
        </div>
        <div class="asst-name">${s.name}</div>
        <div class="asst-tb">${tbLabel(s.tb)} · ${s.count}</div>
      `;
      grid.appendChild(cell);
      const arc = cell.querySelector('.asst-arc');
      setTimeout(() => arc.setAttribute('stroke-dashoffset', offset), 300);
    });
    document.getElementById('asst-total').textContent = `${ASSISTANTS.length} PERSONER`;
  }

  function renderProductions() {
    const list = document.getElementById('prods-list');
    const sorted = [...PRODUCTIONS].sort((a, b) => b.tb - a.tb).slice(0, 9);
    const max = sorted[0].tb;
    list.innerHTML = sorted.map(p => {
      const pct = (p.tb / max) * 100;
      const start = p.client === 'metro' ? '#F5B812' : '#6C8EBF';
      const end   = p.client === 'metro' ? '#DE8640' : '#8B5CF6';
      return `
        <div>
          <div class="barrow">
            <div class="barrow-label">${p.title}</div>
            <div class="barrow-meta">${tbLabel(p.tb)} · ${p.status}</div>
            <div class="barrow-track">
              <div class="barrow-fill" style="width:0; --bar-start:${start}; --bar-end:${end}"></div>
            </div>
          </div>
        </div>
      `;
    }).join('');
    setTimeout(() => {
      list.querySelectorAll('.barrow-fill').forEach((el, i) => {
        const pct = (sorted[i].tb / max) * 100;
        el.style.transition = 'width 0.6s ease';
        el.style.width = pct + '%';
      });
    }, 150);
    document.getElementById('prods-meta').textContent = `${PRODUCTIONS.length} TOTAL`;
  }

  function renderGrowth() {
    // Syntetisk 30-dags vækstkurve — deterministisk noise omkring en svag opadgående trend,
    // endepunkt matcher aktuel totalUsed.
    const days = 30;
    const endValue = totalUsed;
    // Simuler: start på ~82% af current, organisk stigning med daglig volatilitet
    const startValue = endValue * 0.82;

    let rng = 1337;
    function random() { rng = (rng * 1664525 + 1013904223) >>> 0; return rng / 0x100000000; }

    const points = [];
    for (let i = 0; i < days; i++) {
      const t = i / (days - 1);
      const base = startValue + (endValue - startValue) * t;
      const jitter = (random() - 0.5) * endValue * 0.03;
      points.push(Math.max(0, base + jitter));
    }
    points[days - 1] = endValue;

    const svg = document.getElementById('growth-svg');
    const w = 400, h = 120, pad = 4;
    const min = Math.min(...points) * 0.95;
    const max = Math.max(...points) * 1.02;

    const xScale = i => pad + (i / (days - 1)) * (w - pad * 2);
    const yScale = v => h - pad - ((v - min) / (max - min)) * (h - pad * 2);

    let path = '';
    let areaPath = '';
    points.forEach((v, i) => {
      const x = xScale(i), y = yScale(v);
      if (i === 0) { path += `M ${x} ${y}`; areaPath += `M ${x} ${h - pad}`; areaPath += ` L ${x} ${y}`; }
      else { path += ` L ${x} ${y}`; areaPath += ` L ${x} ${y}`; }
    });
    areaPath += ` L ${xScale(days - 1)} ${h - pad} Z`;

    svg.innerHTML = `
      <defs>
        <linearGradient id="growthFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#ED8281" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#ED8281" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#growthFill)"/>
      <path d="${path}" fill="none" stroke="#ED8281" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${xScale(days - 1)}" cy="${yScale(endValue)}" r="3.5" fill="#ED8281"/>
      <circle cx="${xScale(days - 1)}" cy="${yScale(endValue)}" r="7" fill="none" stroke="#ED8281" stroke-opacity="0.4" stroke-width="1"/>
    `;

    const delta = endValue - points[0];
    const deltaPct = (delta / points[0]) * 100;
    document.getElementById('growth-current').textContent = tbLabel(endValue);
    document.getElementById('growth-delta').textContent = `+${deltaPct.toFixed(1)}% 30D`;
  }

  // ---------- Init ----------
  renderClock();
  renderGauge();
  renderRack();
  renderDonut();
  renderAssistants();
  renderProductions();
  renderGrowth();
  setInterval(renderClock, 30000);
</script>

</body>
</html>
